<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Adder CZ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://opencanoetiming.github.io/timing-design-system/dist/timing.min.css">

    <style>
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --adder-accent: #0088ff;
            --adder-accent-glow: rgba(0, 136, 255, 0.4);
        }

        * { box-sizing: border-box; }

        /* Header */
        .app-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px 12px calc(16px + 4px + 12px);
            background-color: var(--color-bg-surface, #141414);
            min-height: 56px;
        }
        .app-header::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--adder-accent);
            box-shadow: 0 0 20px var(--adder-accent-glow);
        }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-title { font-size: 1.25rem; font-weight: 700; color: var(--color-text-primary, #fff); margin: 0; }
        .header-status { display: flex; align-items: center; gap: 12px; }
        .header-file-info { font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace; font-size: 13px; color: var(--color-text-secondary, #999); }
        .badge-tool {
            display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            color: #fff; background-color: var(--adder-accent);
        }

        /* Status bar */
        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 16px; background: var(--color-bg-surface, #141414);
            border-bottom: 1px solid var(--color-border, #333); font-size: 13px;
        }
        .status-bar-left { display: flex; align-items: center; gap: 16px; color: var(--color-text-secondary, #999); }
        .status-bar-right { display: flex; align-items: center; gap: 8px; }
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .status-badge.modified { background: rgba(255, 149, 0, 0.2); color: #ff9500; }
        .status-badge.saved { background: rgba(48, 209, 88, 0.2); color: #30d158; }
        .status-badge.registry { background: rgba(0, 136, 255, 0.15); color: var(--adder-accent); }
        .status-badge.registry-stale { background: rgba(255, 149, 0, 0.2); color: #ff9500; }

        /* Buttons */
        .btn-save { background: #30d158; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-revert { background: transparent; color: #ff453a; border: 1px solid #ff453a; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
        .btn-revert:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-add { background: var(--adder-accent); color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-add:not(:disabled):hover { filter: brightness(1.1); }

        /* Setup */
        .setup-section { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .fs-fallback-note { font-size: 12px; color: var(--color-text-muted, #666); font-style: italic; }

        /* Main layout: left form + right startlist */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            height: calc(100vh - 140px);
        }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; height: auto; } }

        .panel {
            background: var(--color-bg-surface, #1a1a1a);
            border: 1px solid var(--color-border, #333);
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
        }
        .panel h3 {
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--color-text-secondary, #999); margin: 0 0 8px 0;
        }

        /* Search */
        .search-input {
            width: 100%; padding: 8px 10px;
            background: var(--color-bg-body, #0a0a0a); border: 1px solid var(--color-border, #333);
            border-radius: 6px; color: var(--color-text-primary, #fff); font-size: 14px; font-family: inherit;
        }
        .search-input:focus { outline: none; border-color: var(--adder-accent); box-shadow: 0 0 0 2px var(--adder-accent-glow); }
        .search-results { max-height: 180px; overflow-y: auto; margin-top: 4px; border: 1px solid var(--color-border, #333); border-radius: 6px; }
        .search-results:empty { display: none; }
        .search-result-item {
            padding: 5px 10px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between; border-bottom: 1px solid var(--color-border, #333);
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: rgba(0, 136, 255, 0.1); }
        .search-result-item .name { font-weight: 500; }
        .search-result-item .meta { color: var(--color-text-muted, #666); font-size: 12px; }

        /* Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 1px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; color: var(--color-text-muted, #666); }
        .form-group input, .form-group select {
            padding: 5px 7px; background: var(--color-bg-body, #0a0a0a); border: 1px solid var(--color-border, #333);
            border-radius: 5px; color: var(--color-text-primary, #fff); font-size: 13px; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--adder-accent); }
        .form-group input.error { border-color: #ff453a; }
        .form-group input.warning { border-color: #ff9500; }
        .form-group .hint { font-size: 10px; color: var(--color-text-muted, #666); }
        .form-group .hint.error { color: #ff453a; }
        .form-group .hint.warning { color: #ff9500; }

        /* Separator */
        .section-sep { border: none; border-top: 1px solid var(--color-border, #333); margin: 10px 0; }

        /* Race checkboxes */
        .race-list { list-style: none; padding: 0; margin: 4px 0 0 0; }
        .race-list li { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; }
        .race-list li.race-has-results { opacity: 0.6; }
        .race-status-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
        .race-status-0 { background: rgba(0, 136, 255, 0.2); color: var(--adder-accent); }
        .race-status-1 { background: rgba(48, 209, 88, 0.2); color: #30d158; }
        .race-status-3 { background: rgba(255, 149, 0, 0.2); color: #ff9500; }
        .race-status-4 { background: rgba(255, 149, 0, 0.3); color: #ff9500; }
        .race-status-5 { background: rgba(255, 59, 48, 0.2); color: #ff453a; }

        /* Validation */
        .validation-messages { margin-top: 8px; }
        .validation-msg { padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 3px; }
        .validation-msg.error { background: rgba(255, 59, 48, 0.15); color: #ff453a; }
        .validation-msg.warning { background: rgba(255, 149, 0, 0.15); color: #ff9500; }

        /* Action bar */
        .action-bar { margin-top: 10px; display: flex; gap: 8px; align-items: center; }

        /* Added log */
        .added-log { margin-top: 8px; font-size: 12px; }
        .added-log-item { padding: 3px 8px; background: rgba(48, 209, 88, 0.1); border-radius: 4px; margin-bottom: 2px; display: flex; justify-content: space-between; }

        /* Right panel: startlist table */
        .startlist-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .startlist-panel .panel-header {
            flex-shrink: 0;
            padding-bottom: 8px;
        }
        .startlist-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }
        .startlist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .startlist-table th {
            position: sticky;
            top: 0;
            background: var(--color-bg-surface, #1a1a1a);
            text-align: left;
            padding: 4px 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-secondary, #999);
            border-bottom: 1px solid var(--color-border, #333);
            white-space: nowrap;
        }
        .startlist-table th.race-col {
            text-align: center;
            min-width: 50px;
        }
        .startlist-table td {
            padding: 3px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        .startlist-table tr:hover { background: rgba(255, 255, 255, 0.03); }
        .startlist-table .race-check { text-align: center; color: #30d158; }
        .startlist-table .race-nocheck { text-align: center; color: var(--color-text-muted, #444); }
        .startlist-table tr.newly-added {
            background: rgba(0, 136, 255, 0.12);
            font-weight: 500;
        }
        .startlist-table tr.newly-added td:first-child::before {
            content: '\u2605 ';
            color: var(--adder-accent);
        }
        .startlist-empty {
            color: var(--color-text-muted, #666);
            font-size: 13px;
            padding: 20px;
            text-align: center;
        }
        .btn-remove {
            background: transparent; border: none; color: #ff453a; cursor: pointer;
            font-size: 12px; padding: 0 4px; opacity: 0.7; font-family: inherit;
        }
        .btn-remove:hover { opacity: 1; }

        .hidden { display: none !important; }

        /* Alerts */
        .alert-info { background: rgba(0, 136, 255, 0.1); border: 1px solid rgba(0, 136, 255, 0.3); color: var(--adder-accent); padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
        .alert-warning { background: rgba(255, 149, 0, 0.1); border: 1px solid rgba(255, 149, 0, 0.3); color: #ff9500; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
        .alert-error { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: #ff453a; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-brand">
            <h1 class="header-title">Participant Adder CZ</h1>
        </div>
        <div class="header-status">
            <span class="header-file-info" id="headerFileInfo"></span>
            <span class="badge-tool">Dohlasovac</span>
        </div>
    </header>

    <div class="status-bar hidden" id="statusBar">
        <div class="status-bar-left">
            <span id="fileStatus"></span>
            <span id="registryStatus"></span>
        </div>
        <div class="status-bar-right">
            <span id="changesBadge" class="status-badge modified hidden"></span>
            <button class="btn-save" id="btnSave" disabled>Save</button>
            <button class="btn-revert" id="btnRevert" disabled>Revert</button>
        </div>
    </div>

    <div style="padding: 12px;">
        <!-- Setup -->
        <div id="setupSection">
            <div class="setup-section">
                <button class="btn btn-primary" id="btnOpenXml">Open XML file</button>
                <button class="btn btn-secondary" id="btnLoadRegistry">Load registry CSV</button>
                <span id="fsApiNote" class="fs-fallback-note"></span>
            </div>
            <div id="setupAlerts"></div>
        </div>

        <!-- Main editor -->
        <div id="editorSection" class="hidden">
            <div class="main-layout">
                <!-- Left: Competitor + Class + Races -->
                <div class="panel">
                    <h3>Competitor</h3>
                    <input type="text" class="search-input" id="searchInput"
                           placeholder="Search: name, surname, or RGC..." autocomplete="off">
                    <div class="search-results" id="searchResults"></div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>RGC (ICFId)</label>
                            <input type="text" id="fRgc" placeholder="e.g. 60070">
                        </div>
                        <div class="form-group">
                            <label>Year of birth</label>
                            <input type="text" id="fYear" placeholder="e.g. 2010">
                        </div>
                        <div class="form-group">
                            <label>Surname</label>
                            <input type="text" id="fSurname" placeholder="NOVAK">
                        </div>
                        <div class="form-group">
                            <label>First name</label>
                            <input type="text" id="fGivenName" placeholder="Jan">
                        </div>
                        <div class="form-group">
                            <label>Club</label>
                            <input type="text" id="fClub" placeholder="Club name">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="fGender">
                                <option value="t">Male</option>
                                <option value="f">Female</option>
                            </select>
                        </div>
                    </div>

                    <hr class="section-sep">
                    <h3>Class &amp; Startlist</h3>

                    <div class="form-group">
                        <label>Class</label>
                        <select id="fClass" style="width: 100%; padding: 7px;">
                            <option value="">-- select class --</option>
                        </select>
                    </div>

                    <div class="form-grid" style="margin-top: 6px;">
                        <div class="form-group">
                            <label>EventBib</label>
                            <input type="text" id="fBib" placeholder="bib number">
                            <span class="hint" id="fBibHint"></span>
                        </div>
                        <div class="form-group">
                            <label>Participant Id</label>
                            <input type="text" id="fId" placeholder="auto-generated">
                            <span class="hint" id="fIdHint"></span>
                        </div>
                        <div class="form-group">
                            <label>Ranking</label>
                            <input type="text" id="fRanking" placeholder="e.g. 3+">
                        </div>
                        <div class="form-group">
                            <label>Category (auto)</label>
                            <input type="text" id="fCatId" placeholder="auto-calculated" readonly>
                            <span class="hint" id="fCatHint"></span>
                        </div>
                    </div>

                    <hr class="section-sep">
                    <h3>Races</h3>
                    <ul class="race-list" id="raceList">
                        <li style="color: var(--color-text-muted);">Select a class first</li>
                    </ul>

                    <!-- Validation -->
                    <div class="validation-messages" id="validationMessages"></div>

                    <!-- Actions -->
                    <div class="action-bar">
                        <button class="btn-add" id="btnAdd" disabled>ADD Competitor</button>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 13px;" id="btnReset">New search</button>
                    </div>

                    <div class="added-log" id="addedLog"></div>
                </div>

                <!-- Right: Startlist for current class -->
                <div class="panel startlist-panel">
                    <div class="panel-header">
                        <h3>Startlist — <span id="startlistClassName">select class</span></h3>
                    </div>
                    <div class="startlist-scroll" id="startlistScroll">
                        <div class="startlist-empty">Select a class to view startlist</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // =========================================================================
    // STATE
    // =========================================================================
    const NS = 'http://siwidata.com/Canoe123/Data.xsd';
    const REGISTRY_KEY = 'participant-adder-registry';
    const REGISTRY_DATE_KEY = 'participant-adder-registry-date';

    let xmlString = '';
    let xmlHistory = [];        // Stack of saved XML states (for undo)
    let xmlDoc = null;
    let fileHandle = null;
    let changesSinceSave = 0;
    let fileName = '';

    let participants = [];
    let classes = [];
    let schedule = [];
    let results = [];
    let events = {};
    let registry = [];
    let addedCompetitors = [];  // {id, classId, eventBib, icfId, familyName, givenName, club, year, catId, ranking, startOrders, racesCount}

    const hasFileSystemAccess = ('showOpenFilePicker' in window);

    const RACE_STATUS_LABELS = { '0': 'Scheduled', '1': 'StartList', '3': 'InProgress', '4': 'Unofficial', '5': 'Official', '7': 'Cancelled' };

    // =========================================================================
    // UTILITIES
    // =========================================================================
    function xmlEscape(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getTextContent(parent, tagName) {
        const el = parent.getElementsByTagNameNS(NS, tagName)[0] || parent.getElementsByTagName(tagName)[0];
        return el ? (el.textContent || '').trim() : '';
    }

    function raceHasResults(status) { return parseInt(status, 10) >= 3; }

    // =========================================================================
    // FILE SYSTEM ACCESS API
    // =========================================================================
    async function openXmlFile() {
        try {
            if (hasFileSystemAccess) {
                const [handle] = await window.showOpenFilePicker({
                    types: [{ description: 'XML files', accept: { 'text/xml': ['.xml'] } }]
                });
                fileHandle = handle;
                const file = await handle.getFile();
                fileName = file.name;
                xmlString = await file.text();
            } else {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.xml';
                await new Promise((resolve) => {
                    input.onchange = async () => {
                        const file = input.files[0];
                        if (!file) return resolve();
                        fileName = file.name;
                        xmlString = await file.text();
                        resolve();
                    };
                    input.click();
                });
            }
            if (xmlString) {
                xmlHistory = [xmlString];  // Reset stack with original
                addedCompetitors = [];
                changesSinceSave = 0;
                processXml();
            }
        } catch (e) {
            if (e.name !== 'AbortError') showAlert('setupAlerts', `Error opening file: ${e.message}`, 'error');
        }
    }

    async function saveFile() {
        if (!xmlString) return;
        try {
            if (fileHandle) {
                const writable = await fileHandle.createWritable();
                await writable.write(xmlString);
                await writable.close();
            } else {
                const blob = new Blob([xmlString], { type: 'text/xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = fileName || 'modified.xml'; a.click();
                URL.revokeObjectURL(url);
            }
            changesSinceSave = 0;
            xmlHistory.push(xmlString);  // Push saved state onto stack
            addedCompetitors = [];
            updateStatusBar();
            renderAddedLog();
            renderStartlist();
        } catch (e) {
            showAlert('setupAlerts', `Error saving: ${e.message}`, 'error');
        }
    }

    function revertChanges() {
        if (xmlHistory.length === 0) return;

        if (changesSinceSave > 0) {
            // Unsaved changes exist — revert to current baseline (top of stack)
            if (!confirm('Discard unsaved changes?')) return;
            xmlString = xmlHistory[xmlHistory.length - 1];
        } else if (xmlHistory.length > 1) {
            // No unsaved changes — undo last save (pop stack)
            if (!confirm('Undo last save and revert to previous version?')) return;
            xmlHistory.pop();
            xmlString = xmlHistory[xmlHistory.length - 1];
        } else {
            return; // Only original state, nothing to undo
        }

        changesSinceSave = 0;
        addedCompetitors = [];
        processXml();

        // Also write reverted content to disk if possible
        if (fileHandle) {
            fileHandle.createWritable().then(w => { w.write(xmlString); return w.close(); }).catch(() => {});
        }

        const remaining = xmlHistory.length - 1;
        showAlert('setupAlerts',
            `Reverted.${remaining > 0 ? ` ${remaining} more undo step(s) available.` : ' At original file.'}`, 'info');
    }

    // =========================================================================
    // XML PARSING
    // =========================================================================
    function processXml() {
        const parser = new DOMParser();
        xmlDoc = parser.parseFromString(xmlString, 'text/xml');
        if (xmlDoc.querySelector('parsererror')) {
            showAlert('setupAlerts', 'XML parse error', 'error');
            return;
        }
        extractData();
        updateUI();
    }

    function extractData() {
        participants = [];
        for (const p of xmlDoc.getElementsByTagNameNS(NS, 'Participants')) {
            if (getTextContent(p, 'IsTeam') === 'true') continue;
            participants.push({
                id: getTextContent(p, 'Id'),
                classId: getTextContent(p, 'ClassId'),
                eventBib: getTextContent(p, 'EventBib'),
                icfId: getTextContent(p, 'ICFId'),
                familyName: getTextContent(p, 'FamilyName'),
                givenName: getTextContent(p, 'GivenName'),
                club: getTextContent(p, 'Club'),
                year: getTextContent(p, 'Year'),
                catId: getTextContent(p, 'CatId'),
            });
        }

        classes = [];
        for (const c of xmlDoc.getElementsByTagNameNS(NS, 'Classes')) {
            const cats = [];
            for (const cat of c.getElementsByTagNameNS(NS, 'Categories')) {
                cats.push({
                    catId: getTextContent(cat, 'CatId'),
                    category: getTextContent(cat, 'Category'),
                    firstYear: parseInt(getTextContent(cat, 'FirstYear')) || 0,
                    lastYear: parseInt(getTextContent(cat, 'LastYear')) || 0,
                });
            }
            classes.push({
                classId: getTextContent(c, 'ClassId'),
                className: getTextContent(c, 'Class'),
                longTitle: getTextContent(c, 'LongTitle'),
                categories: cats,
            });
        }

        schedule = [];
        for (const s of xmlDoc.getElementsByTagNameNS(NS, 'Schedule')) {
            schedule.push({
                raceId: getTextContent(s, 'RaceId'),
                classId: getTextContent(s, 'ClassId'),
                disId: getTextContent(s, 'DisId'),
                raceStatus: getTextContent(s, 'RaceStatus'),
                startTime: getTextContent(s, 'StartTime') || getTextContent(s, 'Time'),
                firstBib: getTextContent(s, 'FirstBib'),
            });
        }

        results = [];
        for (const r of xmlDoc.getElementsByTagNameNS(NS, 'Results')) {
            results.push({
                raceId: getTextContent(r, 'RaceId'),
                id: getTextContent(r, 'Id'),
                startOrder: parseInt(getTextContent(r, 'StartOrder')) || 0,
                bib: getTextContent(r, 'Bib'),
            });
        }

        const evNodes = xmlDoc.getElementsByTagNameNS(NS, 'Events');
        if (evNodes.length > 0) {
            const ev = evNodes[0];
            events = {
                bibHandling: getTextContent(ev, 'BibHandling'),
                startListsLocked: getTextContent(ev, 'StartListsLocked') === 'true',
                eventName: getTextContent(ev, 'EventName') || getTextContent(ev, 'Event'),
            };
        }
    }

    // =========================================================================
    // REGISTRY
    // =========================================================================
    function loadRegistryFromStorage() {
        try {
            const data = localStorage.getItem(REGISTRY_KEY);
            const date = localStorage.getItem(REGISTRY_DATE_KEY);
            if (data) { registry = JSON.parse(data); updateRegistryStatus(date); return true; }
        } catch (e) { console.warn('Registry load failed:', e); }
        return false;
    }

    async function loadRegistryFile() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.csv,.txt';
        return new Promise((resolve) => {
            input.onchange = () => {
                const file = input.files[0];
                if (!file) return resolve();
                const reader = new FileReader();
                reader.onload = (e) => { parseRegistryCsv(e.target.result); resolve(); };
                reader.readAsText(file, 'windows-1250');
            };
            input.click();
        });
    }

    function parseRegistryCsv(text) {
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) { showAlert('setupAlerts', 'Registry CSV appears empty.', 'warning'); return; }
        const header = lines[0].split(';').map(h => h.trim().replace(/^#/, ''));
        const colIndex = {};
        header.forEach((h, i) => colIndex[h.toLowerCase()] = i);
        const col = (row, name) => { const idx = colIndex[name]; return idx !== undefined ? (row[idx] || '').trim() : ''; };

        registry = [];
        for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split(';');
            if (row.length < 5) continue;
            const rgc = col(row, 'rgc');
            if (!rgc) continue;
            registry.push({
                rgc, surname: col(row, 'prijmeni'), givenName: col(row, 'jmeno'),
                year: col(row, 'datum narozeni'), gender: col(row, 'pohlavi'),
                vk: col(row, 'vk'),
                ks: col(row, 'ks'), c1s: col(row, 'c1s'), c2s: col(row, 'c2s'),
                kw: col(row, 'kw'), c1w: col(row, 'c1w'), c2w: col(row, 'c2w'),
                clubCode: col(row, 'oddil'), clubName: col(row, 'odd_nazev'),
            });
        }

        try {
            const dateStr = new Date().toISOString().slice(0, 10);
            localStorage.setItem(REGISTRY_KEY, JSON.stringify(registry));
            localStorage.setItem(REGISTRY_DATE_KEY, dateStr);
            updateRegistryStatus(dateStr);
        } catch (e) {
            showAlert('setupAlerts', `Registry too large for localStorage. Search works but won't persist.`, 'warning');
        }
        showAlert('setupAlerts', `Registry loaded: ${registry.length} competitors`, 'info');
    }

    function searchRegistry(query) {
        if (!query || query.length < 2) return [];
        const q = query.toLowerCase();
        return registry.filter(r =>
            r.rgc.toLowerCase().startsWith(q) ||
            r.surname.toLowerCase().includes(q) ||
            r.givenName.toLowerCase().includes(q) ||
            (r.surname + ' ' + r.givenName).toLowerCase().includes(q) ||
            (r.givenName + ' ' + r.surname).toLowerCase().includes(q)
        ).slice(0, 20);
    }

    function getRankingForClass(regEntry, classId) {
        if (!regEntry || !classId) return '';
        const isFemale = regEntry.gender === 'f';
        const cid = classId.toUpperCase();
        if (cid.includes('C2')) return isFemale ? regEntry.c2w : regEntry.c2s;
        if (cid.includes('C1')) return isFemale ? regEntry.c1w : regEntry.c1s;
        return isFemale ? regEntry.kw : regEntry.ks;
    }

    // =========================================================================
    // CATEGORY AUTO-CALC
    // =========================================================================
    function calculateCategory(birthYear, classId) {
        if (!birthYear || !classId) return { catId: '', hint: '' };
        const cls = classes.find(c => c.classId === classId);
        if (!cls || cls.categories.length === 0) return { catId: '', hint: 'No categories' };
        const year = parseInt(birthYear);
        if (isNaN(year)) return { catId: '', hint: 'Invalid year' };
        const age = new Date().getFullYear() - year;
        for (const cat of cls.categories) {
            const lo = Math.min(cat.firstYear, cat.lastYear);
            const hi = Math.max(cat.firstYear, cat.lastYear);
            if (lo <= age && age <= hi) return { catId: cat.catId, hint: cat.category };
        }
        return { catId: '', hint: `Age ${age} outside categories` };
    }

    // =========================================================================
    // BIB / ID
    // =========================================================================
    function suggestBib(classId) {
        if (!classId) return '';
        const classParts = participants.filter(p => p.classId === classId);
        const addedParts = addedCompetitors.filter(a => a.classId === classId);
        const allBibs = [...classParts.map(p => parseInt(p.eventBib)), ...addedParts.map(a => parseInt(a.eventBib))].filter(b => !isNaN(b));
        if (allBibs.length === 0) return '1';
        return String(Math.max(...allBibs) + 1);
    }

    function generateParticipantId(rgc, classId) {
        return (rgc && classId) ? `${rgc}.${classId}` : '';
    }

    // =========================================================================
    // VALIDATION
    // =========================================================================
    function validate() {
        const msgs = [];
        const rgc = document.getElementById('fRgc').value.trim();
        const surname = document.getElementById('fSurname').value.trim();
        const classId = document.getElementById('fClass').value;
        const bib = document.getElementById('fBib').value.trim();
        const partId = document.getElementById('fId').value.trim();

        if (!rgc) msgs.push({ type: 'error', text: 'RGC is required' });
        if (!surname) msgs.push({ type: 'error', text: 'Surname is required' });
        if (!classId) msgs.push({ type: 'error', text: 'Class is required' });
        if (!bib) msgs.push({ type: 'error', text: 'EventBib is required' });
        else if (!/^\d+$/.test(bib)) msgs.push({ type: 'error', text: 'EventBib must be a positive integer' });

        // Id uniqueness: event-wide
        if (partId) {
            if (participants.some(p => p.id === partId) || addedCompetitors.some(a => a.id === partId)) {
                msgs.push({ type: 'error', text: `Participant Id "${partId}" already exists` });
            }
        }

        // RGC+ClassId uniqueness
        if (rgc && classId) {
            if (participants.some(p => p.icfId === rgc && p.classId === classId) ||
                addedCompetitors.some(a => a.icfId === rgc && a.classId === classId)) {
                msgs.push({ type: 'error', text: `RGC ${rgc} already in class ${classId}` });
            }
        }

        // Bib uniqueness: per-race (check only selected races)
        if (bib && /^\d+$/.test(bib) && classId) {
            const bibNum = parseInt(bib);
            const checkedRaces = getCheckedRaces();
            for (const race of checkedRaces) {
                const raceResults = results.filter(r => r.raceId === race.raceId);
                const conflict = raceResults.find(r => parseInt(r.bib) === bibNum);
                if (conflict) {
                    const part = participants.find(p => p.id === conflict.id);
                    const name = part ? `${part.familyName} ${part.givenName}` : conflict.id;
                    msgs.push({ type: 'warning', text: `Bib ${bib} already used in ${race.raceId} by ${name}` });
                    break; // one warning is enough
                }
                // Also check added competitors for this race
                const addedConflict = addedCompetitors.find(a =>
                    parseInt(a.eventBib) === bibNum && a.startOrders && a.startOrders[race.raceId]);
                if (addedConflict) {
                    msgs.push({ type: 'warning', text: `Bib ${bib} already assigned in ${race.raceId} (this session)` });
                    break;
                }
            }
        }

        const year = document.getElementById('fYear').value.trim();
        const catHint = document.getElementById('fCatHint').textContent;
        if (year && classId && catHint.includes('outside')) msgs.push({ type: 'warning', text: catHint });

        const checkedRaces = getCheckedRaces();
        if (checkedRaces.length === 0 && classId) msgs.push({ type: 'warning', text: 'No races selected' });
        const withResults = checkedRaces.filter(r => raceHasResults(r.raceStatus));
        if (withResults.length > 0) msgs.push({ type: 'warning', text: `Adding to ${withResults.length} race(s) with results` });

        return msgs;
    }

    function getCheckedRaces() {
        return Array.from(document.querySelectorAll('#raceList input[type="checkbox"]:checked'))
            .map(cb => schedule.find(s => s.raceId === cb.value)).filter(Boolean);
    }

    // =========================================================================
    // XML STRING INSERTION
    // =========================================================================
    function buildParticipantXml(data) {
        return `\n  <Participants>
    <Id>${xmlEscape(data.id)}</Id>
    <ClassId>${xmlEscape(data.classId)}</ClassId>
    <EventBib>${xmlEscape(data.eventBib)}</EventBib>
    <ICFId>${xmlEscape(data.icfId)}</ICFId>
    <FamilyName>${xmlEscape(data.familyName)}</FamilyName>
    <GivenName>${xmlEscape(data.givenName)}</GivenName>
    <NOC>CZE</NOC>
    <Club>${xmlEscape(data.club)}</Club>
    <Ranking>${xmlEscape(data.ranking)}</Ranking>
    <RankingPoints>0</RankingPoints>
    <Birthdate>${xmlEscape(data.year)}-01-01T00:00:00+01:00</Birthdate>
    <Year>${xmlEscape(data.year)}</Year>
    <CatId>${xmlEscape(data.catId)}</CatId>
    <IsTeam>false</IsTeam>
    <Draw />
    <_Bib />
  </Participants>`;
    }

    function buildResultXml(data, raceId) {
        const templateFields = getResultTemplate(raceId);
        const bibPadded = formatBibPadded(data.eventBib);
        const maxOrder = getMaxStartOrder(raceId);
        const startOrder = maxOrder + 1;

        let xml = `\n  <Results>`;
        for (const field of templateFields) {
            if (field === 'RaceId') xml += `\n    <RaceId>${xmlEscape(raceId)}</RaceId>`;
            else if (field === 'Id') xml += `\n    <Id>${xmlEscape(data.id)}</Id>`;
            else if (field === 'StartOrder') xml += `\n    <StartOrder>${startOrder}</StartOrder>`;
            else if (field === 'Bib') xml += `\n    <Bib>${bibPadded}</Bib>`;
            else if (field === 'CatId') xml += `\n    <CatId>${xmlEscape(data.catId)}</CatId>`;
            else if (field === 'StartTime') xml += `\n    <StartTime />`;
            else if (field === 'Status') xml += `\n    <Status />`;
            else if (['Selected', 'CheckListPrinted', 'CheckListCorrected', 'IsRanked', 'HasWildcard'].includes(field))
                xml += `\n    <${field}>false</${field}>`;
            else if (['Time', 'Pen', 'Total', 'TotalBehind', 'Rnk', 'RnkOrder', 'CatRnk', 'CatRnkOrder',
                       'TieBreaker', 'ExtraStartInt', 'CheckListPrintIndex', 'BetterRunNr', 'HeatNr',
                       'LastCleanGate', 'NrFLT', 'PrevTime', 'PrevPen', 'PrevTotal', 'PrevRnk', 'PrevRnkOrder',
                       'PrevCatRnk', 'PrevCatRnkOrder', 'TotalTotal', 'TotalTotalBehind', 'TotalRnk',
                       'TotalRnkOrder', 'TotalCatRnk', 'TotalCatRnkOrder', 'RankingPoints'].includes(field))
                xml += `\n    <${field}>0</${field}>`;
            else xml += `\n    <${field} />`;
        }
        xml += `\n  </Results>`;
        return { xml, startOrder };
    }

    function getResultTemplate(raceId) {
        for (const r of xmlDoc.getElementsByTagNameNS(NS, 'Results')) {
            if (getTextContent(r, 'RaceId') === raceId) {
                return Array.from(r.children).map(ch => ch.localName || ch.tagName);
            }
        }
        // Fallback BR1 template
        return ['RaceId', 'Id', 'StartOrder', 'Bib', 'StartTime', 'Status',
                'dtStart', 'dtFinish', 'Time', 'Gates', 'GateTimes', 'Pen', 'Total',
                'TotalBehind', 'Rnk', 'RnkOrder', 'CatRnk', 'CatRnkOrder', 'CatId',
                'TieBreaker', 'ExtraStartInt', 'CheckListPrintIndex', 'CheckListPrinted',
                'CheckListCorrected', 'Tag', 'Selected', 'IsRanked', 'RecordType',
                'BetterRunNr', 'HeatNr', 'HasWildcard', 'LastCleanGate', 'NrFLT', 'FLT'];
    }

    function getMaxStartOrder(raceId) {
        let max = 0;
        for (const r of results) { if (r.raceId === raceId && r.startOrder > max) max = r.startOrder; }
        for (const a of addedCompetitors) { if (a.startOrders?.[raceId] > max) max = a.startOrders[raceId]; }
        return max;
    }

    function formatBibPadded(bib) {
        let maxWidth = 4;
        for (const r of results) { if (r.bib && r.bib.length > maxWidth) maxWidth = r.bib.length; }
        return String(bib).padStart(maxWidth, ' ');
    }

    function insertIntoXml(participantXml, resultXmls) {
        // Insert participant before <Classes>
        let partPos = xmlString.indexOf('<Classes>');
        if (partPos === -1) partPos = xmlString.indexOf('<Schedule>');
        if (partPos === -1) { showAlert('setupAlerts', 'Cannot find Participant insertion point', 'error'); return false; }
        xmlString = xmlString.slice(0, partPos) + participantXml + '\n  ' + xmlString.slice(partPos);

        // Insert results before <CourseData> or <Events> or </Canoe123Data>
        let resPos = xmlString.indexOf('<CourseData>');
        if (resPos === -1) resPos = xmlString.indexOf('<Events>');
        if (resPos === -1) resPos = xmlString.indexOf('</Canoe123Data>');
        if (resPos === -1) { showAlert('setupAlerts', 'Cannot find Results insertion point', 'error'); return false; }
        xmlString = xmlString.slice(0, resPos) + resultXmls.join('') + '\n  ' + xmlString.slice(resPos);
        return true;
    }

    // =========================================================================
    // ADD COMPETITOR
    // =========================================================================
    function addCompetitor() {
        const msgs = validate();
        renderValidation(msgs);
        if (msgs.some(m => m.type === 'error')) return;

        const data = {
            id: document.getElementById('fId').value.trim(),
            classId: document.getElementById('fClass').value,
            eventBib: document.getElementById('fBib').value.trim(),
            icfId: document.getElementById('fRgc').value.trim(),
            familyName: document.getElementById('fSurname').value.trim().toUpperCase(),
            givenName: document.getElementById('fGivenName').value.trim(),
            club: document.getElementById('fClub').value.trim(),
            year: document.getElementById('fYear').value.trim(),
            catId: document.getElementById('fCatId').value.trim(),
            ranking: document.getElementById('fRanking').value.trim(),
        };

        const participantXml = buildParticipantXml(data);
        const checkedRaces = getCheckedRaces();
        const resultXmls = [];
        const startOrders = {};
        for (const race of checkedRaces) {
            const { xml, startOrder } = buildResultXml(data, race.raceId);
            resultXmls.push(xml);
            startOrders[race.raceId] = startOrder;
        }

        if (!insertIntoXml(participantXml, resultXmls)) return;

        // Re-parse
        xmlDoc = new DOMParser().parseFromString(xmlString, 'text/xml');
        extractData();

        addedCompetitors.push({ ...data, surname: data.familyName, startOrders, racesCount: checkedRaces.length });
        changesSinceSave++;

        // Clear bib so next suggestion picks up the new max+1
        document.getElementById('fBib').value = '';
        document.getElementById('fId').value = '';

        updateStatusBar();
        renderAddedLog();
        updateClassDependentUI();

        showAlert('setupAlerts',
            `Added: ${data.familyName} ${data.givenName} (${data.icfId}) \u2192 ${data.classId}, Bib ${data.eventBib}, ${checkedRaces.length} race(s)`, 'info');
    }

    // =========================================================================
    // REMOVE ADDED COMPETITOR (before save)
    // =========================================================================
    function removeAddedCompetitor(id) {
        const idx = addedCompetitors.findIndex(a => a.id === id);
        if (idx === -1) return;
        const entry = addedCompetitors[idx];

        // Remove Participant XML block: find <Participants>...<Id>{id}</Id>...</Participants>
        const partRegex = new RegExp(`\\s*<Participants>[\\s\\S]*?<Id>${escapeRegex(id)}</Id>[\\s\\S]*?</Participants>`, 'g');
        xmlString = xmlString.replace(partRegex, '');

        // Remove Results XML blocks for this Id
        const resRegex = new RegExp(`\\s*<Results>[\\s\\S]*?<Id>${escapeRegex(id)}</Id>[\\s\\S]*?</Results>`, 'g');
        xmlString = xmlString.replace(resRegex, '');

        // Re-parse
        xmlDoc = new DOMParser().parseFromString(xmlString, 'text/xml');
        extractData();

        addedCompetitors.splice(idx, 1);
        changesSinceSave = Math.max(0, changesSinceSave - 1);

        updateStatusBar();
        renderAddedLog();
        updateClassDependentUI();
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // =========================================================================
    // STARTLIST TABLE (right panel)
    // =========================================================================
    function renderStartlist() {
        const classId = document.getElementById('fClass').value;
        const container = document.getElementById('startlistScroll');
        const titleEl = document.getElementById('startlistClassName');

        if (!classId) {
            container.innerHTML = '<div class="startlist-empty">Select a class to view startlist</div>';
            titleEl.textContent = 'select class';
            return;
        }

        const cls = classes.find(c => c.classId === classId);
        titleEl.textContent = cls ? `${cls.classId} \u2014 ${cls.className || cls.longTitle || ''}` : classId;

        // Races for this class
        const classRaces = schedule.filter(s => s.classId === classId);

        // Participants in this class (from XML + added)
        const classParts = participants.filter(p => p.classId === classId);

        if (classParts.length === 0) {
            container.innerHTML = '<div class="startlist-empty">No participants in this class</div>';
            return;
        }

        // Build table
        let html = '<table class="startlist-table"><thead><tr>';
        html += '<th></th><th>Bib</th><th>Name</th><th>Club</th><th>Year</th>';
        for (const race of classRaces) {
            html += `<th class="race-col" title="${race.raceId}">${race.disId}</th>`;
        }
        html += '</tr></thead><tbody>';

        // Sort by EventBib
        const sorted = [...classParts].sort((a, b) => (parseInt(a.eventBib) || 999) - (parseInt(b.eventBib) || 999));

        // Set of added IDs for highlighting
        const addedIds = new Set(addedCompetitors.map(a => a.id));

        for (const p of sorted) {
            const isNew = addedIds.has(p.id);
            html += `<tr class="${isNew ? 'newly-added' : ''}">`;
            // Remove button for newly added (before save)
            if (isNew) {
                html += `<td><button class="btn-remove" onclick="removeAddedCompetitor('${xmlEscape(p.id)}')" title="Remove">\u2716</button></td>`;
            } else {
                html += '<td></td>';
            }
            html += `<td>${xmlEscape(p.eventBib)}</td>`;
            html += `<td>${xmlEscape(p.familyName)} ${xmlEscape(p.givenName)}</td>`;
            html += `<td>${xmlEscape(p.club)}</td>`;
            html += `<td>${xmlEscape(p.year)}</td>`;

            for (const race of classRaces) {
                const inRace = results.some(r => r.raceId === race.raceId && r.id === p.id);
                html += `<td class="${inRace ? 'race-check' : 'race-nocheck'}">${inRace ? '\u2713' : '\u00B7'}</td>`;
            }
            html += '</tr>';
        }

        html += '</tbody></table>';
        container.innerHTML = html;

        // Scroll to newly added
        const newRow = container.querySelector('tr.newly-added:last-of-type');
        if (newRow) newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // =========================================================================
    // UI
    // =========================================================================
    function updateUI() {
        document.getElementById('editorSection').classList.remove('hidden');
        document.getElementById('statusBar').classList.remove('hidden');

        const classSelect = document.getElementById('fClass');
        const currentVal = classSelect.value;
        classSelect.innerHTML = '<option value="">-- select class --</option>';
        for (const c of classes) {
            if (c.classId === 'NA') continue;
            const opt = document.createElement('option');
            opt.value = c.classId;
            opt.textContent = `${c.classId} \u2014 ${c.className || c.longTitle || ''}`;
            classSelect.appendChild(opt);
        }
        if (currentVal) classSelect.value = currentVal;

        updateStatusBar();
        document.getElementById('headerFileInfo').textContent = fileName;
        updateClassDependentUI();
    }

    function updateStatusBar() {
        document.getElementById('fileStatus').textContent = fileName ? `File: ${fileName}` : '';
        const badge = document.getElementById('changesBadge');
        if (changesSinceSave > 0) {
            badge.textContent = `${changesSinceSave} unsaved`;
            badge.className = 'status-badge modified';
            badge.classList.remove('hidden');
            document.getElementById('btnSave').disabled = false;
        } else if (addedCompetitors.length > 0) {
            badge.textContent = 'Saved';
            badge.className = 'status-badge saved';
            badge.classList.remove('hidden');
            document.getElementById('btnSave').disabled = true;
        } else {
            badge.classList.add('hidden');
            document.getElementById('btnSave').disabled = true;
        }
        // Enable revert if: unsaved changes OR can undo a previous save
        document.getElementById('btnRevert').disabled = changesSinceSave === 0 && xmlHistory.length <= 1;
    }

    function updateRegistryStatus(dateStr) {
        const el = document.getElementById('registryStatus');
        if (!el || registry.length === 0) { if (el) el.innerHTML = ''; return; }
        const daysSince = dateStr ? Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000) : null;
        const stale = daysSince !== null && daysSince > 30;
        el.innerHTML = `<span class="status-badge ${stale ? 'registry-stale' : 'registry'}">
            Registry: ${registry.length}${dateStr ? ` (${dateStr})` : ''}${stale ? ' STALE' : ''}</span>`;
    }

    function updateClassDependentUI() {
        const classId = document.getElementById('fClass').value;
        const raceListEl = document.getElementById('raceList');

        if (!classId) {
            raceListEl.innerHTML = '<li style="color: var(--color-text-muted);">Select a class first</li>';
            document.getElementById('fBibHint').textContent = '';
            renderStartlist();
            return;
        }

        // Suggest bib
        if (!document.getElementById('fBib').value) {
            document.getElementById('fBib').value = suggestBib(classId);
        }

        // Bib hint: show used bibs in this class
        const classBibs = participants.filter(p => p.classId === classId)
            .map(p => parseInt(p.eventBib)).filter(b => !isNaN(b)).sort((a, b) => a - b);
        const addedBibs = addedCompetitors.filter(a => a.classId === classId)
            .map(a => parseInt(a.eventBib)).filter(b => !isNaN(b));
        const allBibs = [...classBibs, ...addedBibs].sort((a, b) => a - b);
        document.getElementById('fBibHint').textContent = allBibs.length > 0
            ? `Used in class: ${formatBibsRange(allBibs)}` : '';

        // Generate Id
        const rgc = document.getElementById('fRgc').value.trim();
        if (rgc) document.getElementById('fId').value = generateParticipantId(rgc, classId);

        // Category
        const year = document.getElementById('fYear').value.trim();
        if (year) {
            const { catId, hint } = calculateCategory(year, classId);
            document.getElementById('fCatId').value = catId;
            document.getElementById('fCatHint').textContent = hint;
        }

        // Ranking
        if (rgc) {
            const regEntry = registry.find(r => r.rgc === rgc);
            if (regEntry) document.getElementById('fRanking').value = getRankingForClass(regEntry, classId) || '';
        }

        // Races
        const classRaces = schedule.filter(s => s.classId === classId);
        raceListEl.innerHTML = '';
        if (classRaces.length === 0) {
            raceListEl.innerHTML = '<li style="color: var(--color-text-muted);">No races for this class</li>';
        } else {
            for (const race of classRaces) {
                const hasRes = raceHasResults(race.raceStatus);
                const li = document.createElement('li');
                if (hasRes) li.classList.add('race-has-results');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.value = race.raceId;
                cb.checked = !hasRes && !events.startListsLocked;
                cb.addEventListener('change', runValidation);
                const label = document.createElement('span');
                label.textContent = `${race.raceId} (${race.disId})`;
                const badge = document.createElement('span');
                badge.className = `race-status-badge race-status-${race.raceStatus}`;
                badge.textContent = RACE_STATUS_LABELS[race.raceStatus] || race.raceStatus;
                li.append(cb, document.createTextNode(' '), label, document.createTextNode(' '), badge);
                raceListEl.appendChild(li);
            }
        }

        renderStartlist();
        runValidation();
    }

    function formatBibsRange(bibs) {
        const unique = [...new Set(bibs)].sort((a, b) => a - b);
        if (unique.length === 0) return 'none';
        const ranges = [];
        let start = unique[0], end = unique[0];
        for (let i = 1; i < unique.length; i++) {
            if (unique[i] === end + 1) { end = unique[i]; }
            else { ranges.push(start === end ? String(start) : `${start}-${end}`); start = end = unique[i]; }
        }
        ranges.push(start === end ? String(start) : `${start}-${end}`);
        return ranges.join(', ');
    }

    function runValidation() {
        const msgs = validate();
        renderValidation(msgs);
    }

    function renderValidation(msgs) {
        const container = document.getElementById('validationMessages');
        container.innerHTML = '';
        for (const msg of msgs) {
            const div = document.createElement('div');
            div.className = `validation-msg ${msg.type}`;
            div.textContent = (msg.type === 'error' ? '\u2718 ' : '\u26A0 ') + msg.text;
            container.appendChild(div);
        }
        document.getElementById('btnAdd').disabled = msgs.some(m => m.type === 'error');
    }

    function renderAddedLog() {
        const container = document.getElementById('addedLog');
        container.innerHTML = '';
        if (addedCompetitors.length === 0) return;
        const header = document.createElement('div');
        header.style.cssText = 'font-weight: 600; margin-bottom: 4px; color: var(--color-text-secondary); font-size: 11px; text-transform: uppercase;';
        header.textContent = `Added (${addedCompetitors.length}):`;
        container.appendChild(header);
        for (const a of addedCompetitors) {
            const div = document.createElement('div');
            div.className = 'added-log-item';
            div.innerHTML = `<span>${xmlEscape(a.familyName)} ${xmlEscape(a.givenName)} \u2192 ${xmlEscape(a.classId)}, Bib ${xmlEscape(a.eventBib)}</span>
                             <span>${a.racesCount} race(s)</span>`;
            container.appendChild(div);
        }
    }

    function showAlert(containerId, message, type) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = `alert-${type}`;
        div.textContent = message;
        container.prepend(div);
        setTimeout(() => div.remove(), 8000);
    }

    function fillFormFromRegistry(entry) {
        document.getElementById('fRgc').value = entry.rgc;
        document.getElementById('fSurname').value = entry.surname;
        document.getElementById('fGivenName').value = entry.givenName;
        document.getElementById('fYear').value = entry.year;
        document.getElementById('fGender').value = entry.gender || 't';
        document.getElementById('fClub').value = entry.clubName || entry.clubCode || '';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = `${entry.surname} ${entry.givenName}`;
        updateClassDependentUI();
    }

    function resetForm() {
        for (const id of ['searchInput', 'fRgc', 'fSurname', 'fGivenName', 'fYear', 'fClub', 'fRanking', 'fCatId', 'fBib', 'fId']) {
            document.getElementById(id).value = '';
        }
        document.getElementById('fGender').value = 't';
        document.getElementById('fCatHint').textContent = '';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('validationMessages').innerHTML = '';
        document.getElementById('btnAdd').disabled = true;
        // Keep class selection
    }

    // =========================================================================
    // EVENT HANDLERS
    // =========================================================================
    document.getElementById('btnOpenXml').addEventListener('click', openXmlFile);
    document.getElementById('btnLoadRegistry').addEventListener('click', loadRegistryFile);
    document.getElementById('btnSave').addEventListener('click', saveFile);
    document.getElementById('btnRevert').addEventListener('click', revertChanges);
    document.getElementById('btnAdd').addEventListener('click', addCompetitor);
    document.getElementById('btnReset').addEventListener('click', resetForm);

    document.getElementById('searchInput').addEventListener('input', function() {
        const res = searchRegistry(this.value);
        const container = document.getElementById('searchResults');
        container.innerHTML = '';
        for (const r of res) {
            const div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = `<span class="name">${xmlEscape(r.surname)} ${xmlEscape(r.givenName)}</span>
                             <span class="meta">${r.rgc} | ${xmlEscape(r.clubName || r.clubCode)} | ${r.year}</span>`;
            div.addEventListener('click', () => fillFormFromRegistry(r));
            container.appendChild(div);
        }
    });

    document.getElementById('fClass').addEventListener('change', function() {
        document.getElementById('fBib').value = '';
        updateClassDependentUI();
    });

    // Validate on any form input change
    for (const id of ['fRgc', 'fSurname', 'fBib', 'fId', 'fYear', 'fGivenName', 'fClub']) {
        document.getElementById(id).addEventListener('input', runValidation);
    }

    document.getElementById('fRgc').addEventListener('input', function() {
        const classId = document.getElementById('fClass').value;
        if (classId) document.getElementById('fId').value = generateParticipantId(this.value.trim(), classId);
    });

    document.getElementById('fYear').addEventListener('input', function() {
        const classId = document.getElementById('fClass').value;
        if (classId) {
            const { catId, hint } = calculateCategory(this.value.trim(), classId);
            document.getElementById('fCatId').value = catId;
            document.getElementById('fCatHint').textContent = hint;
        }
    });

    window.addEventListener('beforeunload', function(e) {
        if (changesSinceSave > 0) { e.preventDefault(); e.returnValue = ''; }
    });

    if (!hasFileSystemAccess) {
        document.getElementById('fsApiNote').textContent = 'File System Access API not available. Files will be downloaded instead of saved in place.';
    }

    loadRegistryFromStorage();
    </script>
</body>
</html>
